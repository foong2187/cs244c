# Storage configuration for WF data collection pipeline.
#
# The pipeline now uses emptyDir (node-local scratch) for all pods and GCS
# as the sole durable store.  No PersistentVolume or PersistentVolumeClaim
# is required.  The StorageClass is kept in case it is needed in future.

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: wf-data-storage
provisioner: pd.csi.storage.gke.io
parameters:
  type: pd-balanced
  replication-type: none
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer

---

# ConfigMap for GCS bucket and mount path configuration.
# GCS_BUCKET and PROJECT_ID are substituted by deploy.sh.
apiVersion: v1
kind: ConfigMap
metadata:
  name: wf-config
  namespace: argo
data:
  GCS_BUCKET_NAME: "wflab-storage-wflab01-247b0fef"
  PROJECT_ID: "wflab01"
  DATA_MOUNT_PATH: "/app/data"
