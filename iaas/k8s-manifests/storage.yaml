# Single StorageClass for all workflow data (pd-balanced via GKE CSI driver)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: wf-data-storage
provisioner: pd.csi.storage.gke.io
parameters:
  type: pd-balanced
  replication-type: none
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer

---

# Single Persistent Volume backed by the GCE disk provisioned by Terraform.
# DATA_DISK_NAME is substituted by deploy.sh from terraform output data_storage_disk_name.
# Data is organised into sub-paths within the volume:
#   pcap/       – raw tcpdump captures
#   pickle/     – processed direction-sequence numpy arrays
#   analysis/   – EDA plots and statistics
#   logs/       – collection.log, progress.csv
apiVersion: v1
kind: PersistentVolume
metadata:
  name: data-storage-pv
  labels:
    purpose: wf-data-storage
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: wf-data-storage
  csi:
    driver: pd.csi.storage.gke.io
    volumeHandle: wflab-cluster-data-storage
    fsType: ext4

---

# Single Persistent Volume Claim for all workflow data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-storage-pvc
  namespace: argo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Gi
  storageClassName: wf-data-storage
  selector:
    matchLabels:
      purpose: wf-data-storage

---

# ConfigMap for GCS bucket and mount path configuration.
# GCS_BUCKET and PROJECT_ID are substituted by deploy.sh.
apiVersion: v1
kind: ConfigMap
metadata:
  name: wf-config
  namespace: argo
data:
  GCS_BUCKET_NAME: "wflab-storage-wflab01-247b0fef"
  PROJECT_ID: "wflab01"
  DATA_MOUNT_PATH: "/app/data"
